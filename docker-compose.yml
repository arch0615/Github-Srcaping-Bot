services:
  db:
    image: postgres:16
    container_name: ghscraper-db
    environment:
      POSTGRES_USER: ghscraper
      POSTGRES_PASSWORD: ghscraper
      POSTGRES_DB: ghscraper
    ports:
      - "5432:5432"
    volumes:
      - ghscraper_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghscraper"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ghscraper_data:
